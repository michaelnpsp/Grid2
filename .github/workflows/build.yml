name: Build Grid2

on:
  workflow_dispatch:
    inputs:
      mists:
        type: boolean
        description: Pandaria
      bcc:
        type: boolean
        description: Burning
      classic:
        type: boolean
        description: Classic
      titan:
        type: boolean
        description: Titan

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v1
        with:
          fetch-depth: 200

      - name: Create MoP Package
        if: ${{ inputs.mists }}
        uses: BigWigsMods/packager@master
        with:
          args: -g mists -m .pkgmeta-mists
        env:
          GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          WAGO_API_TOKEN: ${{ secrets.WAGO_API_TOKEN }}

      - name: Create BCC Package
        if: ${{ inputs.bcc }}
        uses: BigWigsMods/packager@master
        with:
          args: -g bcc -m .pkgmeta-bcc
        env:
          GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          WAGO_API_TOKEN: ${{ secrets.WAGO_API_TOKEN }}

      - name: Create Vanilla Package
        if: ${{ inputs.classic }}
        uses: BigWigsMods/packager@master
        with:
          args: -g classic -m .pkgmeta-classic
        env:
          GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          WAGO_API_TOKEN: ${{ secrets.WAGO_API_TOKEN }}

      - name: Create Titan Package
        if: ${{ inputs.titan }}
        uses: BigWigsMods/packager@master
        with:
          args: -g titan -m .pkgmeta-wrath
        env:
          GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          WAGO_API_TOKEN: ${{ secrets.WAGO_API_TOKEN }}
